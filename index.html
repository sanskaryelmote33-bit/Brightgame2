let timeLeft = 10;
let started = false;

function openAd() {
  if (started) return;
  started = true;

  window.open("https://www.profitablecpmratenetwork.com/m3ixsj0zj?key=40ccb40392a65e623db65082a9041578", "_blank");

  let timer = setInterval(() => {

    timeLeft--;

    if (timeLeft < 0) {
      clearInterval(timer);
      document.getElementById("lock").style.display = "none";
      document.getElementById("content").style.display = "block";
    }
  }, 1000);
}

// ORIGINAL FUNCTION
function editFile() {
  let file = document.getElementById("file").files[0];
  let current = parseInt(document.getElementById("current").value);
  let newval = parseInt(document.getElementById("newval").value);

  if (!file) return alert("Upload file");
  if (!current || !newval) return alert("Enter values");

  let reader = new FileReader();

  reader.onload = function(e) {
    let data = new Uint8Array(e.target.result);

    let oldBytes = [
      current & 0xFF,
      (current >> 8) & 0xFF,
      (current >> 16) & 0xFF,
      (current >> 24) & 0xFF
    ];

    let newBytes = [
      newval & 0xFF,
      (newval >> 8) & 0xFF,
      (newval >> 16) & 0xFF,
      (newval >> 24) & 0xFF
    ];

    let found = false;

    for (let i = 0; i < data.length - 4; i++) {
      if (
        data[i] === oldBytes[0] &&
        data[i+1] === oldBytes[1] &&
        data[i+2] === oldBytes[2] &&
        data[i+3] === oldBytes[3]
      ) {
        data[i] = newBytes[0];
        data[i+1] = newBytes[1];
        data[i+2] = newBytes[2];
        data[i+3] = newBytes[3];
        found = true;
        break;
      }
    }

    if (!found) {
      document.getElementById("status").innerText = "❌ Value not found";
      return;
    }

    let blob = new Blob([data]);
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "PlayerData_modified.bytes";
    a.click();

    document.getElementById("status").innerText = "✅ Success!";
  };

  reader.readAsArrayBuffer(file);
}
